services:
  app:
    container_name: vipay_erp_backend
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    ports:
      - "8000:8000"
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres-server
      DB_PORT: 5432
      DB_DATABASE: estable
      DB_USERNAME: root
      DB_PASSWORD: secret
    networks:
      - shared-network
      - app-network

  # Queue worker — Estable tenant-aware jobs'ni qayta ishlaydi.
  # Stancl QueueTenancyBootstrapper job payload'idagi tenant_id bo'yicha avtomatik
  # tenant kontekstga o'tadi. --tries=3 qayta urinish, --backoff=10 qayta urinishlar
  # oralig'ida 10 sekund, --max-time=3600 har soatda restart (memory leak'dan himoya).
  queue-worker:
    container_name: vipay_erp_queue
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    command: php artisan queue:work --tries=3 --backoff=10 --max-time=3600 --sleep=3
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres-server
      DB_PORT: 5432
      DB_DATABASE: estable
      DB_USERNAME: root
      DB_PASSWORD: secret
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - shared-network
      - app-network

  # Scheduler — har daqiqada schedule:run bajariladi (Laravel ichida task vaqtlari tekshiriladi)
  scheduler:
    container_name: vipay_erp_scheduler
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    command: php artisan schedule:work
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres-server
      DB_PORT: 5432
      DB_DATABASE: estable
      DB_USERNAME: root
      DB_PASSWORD: secret
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - shared-network
      - app-network

networks:
  app-network:
    driver: bridge
  shared-network:
    external: true
